<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
    <h1>💰 Budget Tracker</h1>
    <div class="topbar-right">
        <span id="welcomeUser"></span>
        <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>
</header>

<main class="container">

    <!-- ===== Summary Cards ===== -->
    <section class="summary-cards">
        <div class="card income">
            <span class="card-label">Income (this month)</span>
            <span class="card-value" id="sumIncome">₹0</span>
        </div>
        <div class="card expense">
            <span class="card-label">Expense (this month)</span>
            <span class="card-value" id="sumExpense">₹0</span>
        </div>
        <div class="card balance">
            <span class="card-label">Balance (this month)</span>
            <span class="card-value" id="sumBalance">₹0</span>
        </div>
        <div class="card alltime">
            <span class="card-label">All-time Balance</span>
            <span class="card-value" id="sumAllTime">₹0</span>
        </div>
    </section>

    <!-- ===== Category Breakdown ===== -->
    <section class="panel">
        <h2>Expense Breakdown (this month)</h2>
        <div id="categoryBreakdown" class="breakdown-list">
            <p class="empty-msg">No expenses yet this month.</p>
        </div>
    </section>

    <!-- ===== Add / Edit Transaction Form ===== -->
    <section class="panel">
        <h2 id="formTitle">Add Transaction</h2>
        <form id="transactionForm" class="transaction-form">
            <input type="hidden" id="transactionId">

            <div class="form-row">
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" required>
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" step="0.01" min="0.01" required>
                </div>

                <div class="form-group">
                    <label for="category_id">Category</label>
                    <select id="category_id"></select>
                </div>

                <div class="form-group">
                    <label for="transaction_date">Date</label>
                    <input type="date" id="transaction_date" required>
                </div>
            </div>

            <div class="form-group full">
                <label for="description">Description</label>
                <input type="text" id="description" placeholder="e.g. Grocery shopping">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary" id="submitBtn">Add Transaction</button>
                <button type="button" class="btn-secondary" id="cancelEditBtn" style="display:none;">Cancel</button>
            </div>
        </form>
    </section>

    <!-- ===== Transactions Table ===== -->
    <section class="panel">
        <div class="panel-header">
            <h2>Transactions</h2>
            <div class="filters">
                <select id="filterType">
                    <option value="">All Types</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
                <input type="month" id="filterMonth">
                <button id="clearFilters" class="btn-secondary">Clear</button>
            </div>
        </div>

        <table class="transactions-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="transactionsBody">
                <!-- rows injected by JS -->
            </tbody>
        </table>
        <p id="noTransactionsMsg" class="empty-msg" style="display:none;">No transactions found.</p>
    </section>

    <!-- ===== Manage Categories ===== -->
    <section class="panel">
        <h2>Manage Categories</h2>
        <form id="categoryForm" class="category-form">
            <input type="text" id="newCategoryName" placeholder="Category name" required>
            <select id="newCategoryType">
                <option value="expense">Expense</option>
                <option value="income">Income</option>
            </select>
            <button type="submit" class="btn-primary">Add Category</button>
        </form>
        <ul id="categoryList" class="category-list"></ul>
    </section>

</main>

<script src="js/app.js"></script>
</body>
</html>
